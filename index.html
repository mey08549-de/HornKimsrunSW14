<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Boostrape form</title>
    <!-- <link rel="stylesheet" href=""> -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
     integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">

<body>
    <div class="container h-100 d-flex justify-content-center align-items-center  p-lg-2 mt-5 ">
        <div class="row justify-content-center align-items-center ">
            <form id="userForm" class="shadow-lg p-3 mt-5 bg-body-tertiary rounded">
                <div class="mb-1 ">
                    <h3 class="text-primary" >USER INFORMATION FORM</h3>
                    <label for="fullname" class="form-label">Full Name:</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-heart"></i>
                        </span>
                        <input type="text" class="form-control" id="fullname" placeholder="Enter your fullname" required>
                    </div>
                    
                     
                    <label for="fullname" class="form-label ">Gender :</label>
                    <div class="form-check form-check-inline mt-3">
                        
  <input class="form-check-input" type="radio" name="gender" id="male" value="male"  checked>
  <label class="form-check-label" for="inlineRadio1" >Male</label>

</div>






                    <div class="form-check form-check-inline mt-3">
                       

  <input  class="form-check-input" type="radio" name="gender" id="female" value="female">
  <label class="form-check-label" for="inlineRadio1">Female</label>

</div>

<!-- Salary -->
<div class="mb-3">
    <label for="salary" class="form-label">Salary :</label>
     <div class="input-group">
        <span class="input-group-text">
                            <i class="bi bi-cash-coin"></i>
                            </span>
                       
    <input id="salary" type="number" class="form-control" placeholder="Enter your salary" required>

     </div>
</div>



<!-- DOB -->

<div class="mb-3">
    <label for="const {propertyName} = objectToDestruct;" class="form-label">Date-of-birth :</label>
 
     <div class="input-group">
        <span class="input-group-text">
<i class="bi bi-calendar"></i>                            </span>
                       
   <input id="dob" type="date" class="form-control" required>
     </div>
</div>


<!-- positioin -->
<div class="mb-3">
    <label for="position">Positon</label>
    <div class="input-group">
        <span class="input-group-text">
<i class="bi bi-database-check"></i>                          </span>
                       
  
    
    <select  id="position" class="form-select">
                <option value="Consulstance IT">Consulstance IT</option>
                <option value="IT Manager">IT Manager</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="Software Engineering">Software Development</option>
              
    </select>
     </div>
</div>

<!-- descriptioin -->
<div class="mb-3">
    <label for="description" class="form-label" >Description</label>
    <!-- textarea   use for write with string -->
    <textarea name="" id="description" class="form-control" placeholder="Enter you description"></textarea>
</div>







        <!-- button -->
  <!-- <div class="justify-content-center mt-3 ">
                        <button type="submit" class="btn btn-primary btn-outline-primary text-white me-3 w-25">Submit</button>
                        <button type="reset" class="btn  btn-outline-danger w-25 ">Reset</button>

                     </div> -->
                        <div class="mb-3">
                <button id="submit" class="btn btn-primary w-25 me-3">Submit</button>
                <button class="btn btn-outline-danger w-25">Clear</button>
                <div id="result" class="mt-3"></div>
            </div>

</form>
                   


            </div>
        </div>
    </div>
    
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
 integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 <script src="index.js"></script>
</html>
